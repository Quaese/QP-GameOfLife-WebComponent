<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QP Game of Life — Web Component Demo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: monospace;
        background: #1a1a2e;
        color: #e0e0e0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }

      p {
        font-size: 0.875rem;
        color: #999;
        margin-bottom: 1.5rem;
      }

      .demo {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        /* Logo "qp-game-of-life" = 15 chars × (3 + 1) - 1 = 59 cells.
           Board total width = N × cell-size + 4 (2px content padding + 2px border).
           904px = 60 × 15 + 4 → exact fit for 60 cells (1-cell buffer for the logo). */
        width: max(90vw, 904px);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
      }

      button {
        font-family: monospace;
        font-size: 0.875rem;
        padding: 0.5rem 1rem;
        background: #2d2d44;
        color: #e0e0e0;
        border: 1px solid #555;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background: #3d3d54;
        border-color: #888;
      }

      .board-frame {
        background: #fff;
        padding: 0.5rem;
        border-radius: 4px;
      }

      qp-game-of-life {
        width: 100%;
        height: 30vh;
      }

      .log {
        margin-top: 1.5rem;
        padding: 1rem;
        background: #0f0f23;
        border: 1px solid #333;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.75rem;
        width: min(90vw, 500px);
        max-height: 150px;
        overflow-y: auto;
      }

      .log p {
        color: #7fba72;
        margin: 0.15rem 0;
      }
    </style>
  </head>
  <body>
    <h1>&lt;qp-game-of-life&gt; Demo</h1>
    <p>
      Click <strong>start</strong> to dissolve the logo into Conway's chaos &middot;
      <strong>random text</strong> seeds a word from the pool
    </p>

    <div class="demo">
      <div class="controls">
        <button data-action="start">start</button>
        <button data-action="pause">pause</button>
        <button data-action="continue">continue</button>
        <button data-action="stop">stop</button>
        <button data-action="reset">reset</button>
        <button data-action="randomize">randomize</button>
        <button data-action="randomText">random text</button>
      </div>
      <div class="board-frame">
        <qp-game-of-life cell-size="15" interval="100"></qp-game-of-life>
      </div>
    </div>

    <div class="log" id="log"></div>

    <script type="module" src="./qp-game-of-life.bundle.js"></script>
    <script>
      const game = document.querySelector("qp-game-of-life");
      const log = document.getElementById("log");

      function addLog(msg) {
        const p = document.createElement("p");
        p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        log.prepend(p);
      }

      document.querySelectorAll(".controls button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const action = btn.dataset.action;
          game[action]();
        });
      });

      game.addEventListener("qp-game-of-life:statechange", (e) =>
        addLog(`State: ${e.detail.previousState} → ${e.detail.currentState}`)
      );
    </script>
  </body>
</html>
